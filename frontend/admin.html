<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - My Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">My Store Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">Admin Dashboard</h2>

    <!-- Tabs -->
    <ul class="nav nav-tabs flex-wrap gap-2" id="adminTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products" type="button" role="tab">Products</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders" type="button" role="tab">Orders</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab">Users</button>
      </li>
    </ul>

    <div class="tab-content" id="adminTabContent">
      <!-- Products Tab -->
      <div class="tab-pane fade show active" id="products" role="tabpanel">
        <!-- Add/Edit Product Form -->
        <div class="card mb-4">
          <div class="card-header">Add/Edit Product</div>
          <div class="card-body">
            <div id="productMessage"></div>
            <form id="productForm" enctype="multipart/form-data">
              <input type="hidden" id="productId" name="id">
              <div class="row">
                <div class="col-md-6">
                  <label for="name" class="form-label">Product Name</label>
                  <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6">
                  <label for="price" class="form-label">Price</label>
                  <input type="number" class="form-control" id="price" name="price" step="0.01" required>
                </div>
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
              </div>
              <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control" id="category" name="category" placeholder="e.g., Electronics, Clothing">
              </div>
              <div class="mb-3">
                <label for="image" class="form-label">Image</label>
                <input type="file" class="form-control" id="image" name="image">
              </div>
              <div class="admin-form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">Add Product</button>
                <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Products Table -->
        <div class="card admin-table-card">
          <div class="card-header">Products List</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-striped" id="productsTable">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Image</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Orders Tab -->
      <div class="tab-pane fade" id="orders" role="tabpanel">
        <div class="card admin-table-card">
          <div class="card-header">Orders Management</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-striped" id="ordersTable">
                <thead>
                  <tr>
                    <th>Tracking ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Products</th>
                    <th>Payment</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Users Tab -->
      <div class="tab-pane fade" id="users" role="tabpanel">
        <div class="card admin-table-card">
          <div class="card-header">Users Management</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-striped" id="usersTable">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Joined</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
