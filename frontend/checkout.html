<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
</head>
<body class="checkout-page">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">

<a class="navbar-brand fw-bold" href="/">
  <i class="fas fa-store"></i> My Store
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<i class="fas fa-bars navbar-toggler-icon-custom"></i>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav me-auto">
  <li class="nav-item">
    <a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a>
  </li>
</ul>

<ul class="navbar-nav ms-auto align-items-center">
  <li class="nav-item">
    <a class="nav-link" href="cart.html">
      <i class="fas fa-shopping-cart"></i> Cart <span id="cartCount" class="badge bg-warning text-dark">0</span>
    </a>
  </li>
  <li class="nav-item dropdown">
    <a class="nav-link dropdown-toggle" href="#" id="accountDropdown" role="button" data-bs-toggle="dropdown">
      <i class="fas fa-user"></i> Account
    </a>
    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="user-login.html">Login</a></li>
      <li><a class="dropdown-item" href="user-signup.html">Sign Up</a></li>
      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item" href="user-dashboard.html">Dashboard</a></li>
    </ul>
  </li>
</ul>

</div>
</div>
</nav>

<div class="container">
  <div class="mobile-shell">
    <div class="card checkout-card shadow-sm border-0">
      <div class="card-body p-3 p-sm-4">
        <h2 class="mb-4 text-center text-sm-start">Checkout</h2>

        <!-- Message -->
        <div id="checkoutMessage" class="mb-3"></div>
        
        <form id="checkoutForm">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" id="name" class="form-control" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea id="address" class="form-control" required></textarea>
          </div>

          <!-- Location Selection -->
          <div class="mb-3">
            <label class="form-label">Select Location on Map (optional)</label>
            <div id="map" style="height: 300px; width: 100%;"></div>
            <input type="hidden" id="latitude" name="latitude">
            <input type="hidden" id="longitude" name="longitude">
          </div>

          <!-- Payment Method -->
          <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select id="paymentMethod" class="form-control" required>
              <option value="">Select Payment Method</option>
              <option value="Cash on Delivery">Cash on Delivery</option>
              <option value="EasyPaisa">EasyPaisa</option>
              <option value="Card">Card</option>
            </select>
          </div>

          <!-- EasyPaisa -->
          <div id="easyPaisaInfo" class="mb-3" style="display:none;">
            <p>Send payment to EasyPaisa Number: <strong>03001234567</strong></p>
            <img src="/images/easypaisa-qr.png" width="150" alt="EasyPaisa QR code" class="img-fluid mt-2">
          </div>

          <!-- Card -->
          <div id="cardForm" class="mb-3" style="display:none;">
            <input type="text" id="cardNumber" class="form-control mb-2" placeholder="Card Number">
            <input type="text" id="expiry" class="form-control mb-2" placeholder="MM/YY">
            <input type="text" id="cvc" class="form-control" placeholder="CVC">
          </div>

          <button type="submit" class="btn btn-primary checkout-submit-btn">Place Order</button>

        </form>
      </div>
    </div>
  </div>
</div>

<script src="/js/checkout.js"></script>

<script>
// Toggle payment UI
const paymentSelect = document.getElementById("paymentMethod");
const easyPaisaInfo = document.getElementById("easyPaisaInfo");
const cardForm = document.getElementById("cardForm");

paymentSelect.addEventListener("change", () => {
  const method = paymentSelect.value;
  easyPaisaInfo.style.display = method === "EasyPaisa" ? "block" : "none";
  cardForm.style.display = method === "Card" ? "block" : "none";
});

// Initialize map
var map = L.map('map').setView([33.6844, 73.0479], 13); // Default to Islamabad or something, but user can change

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);
// Add search control
L.Control.geocoder().addTo(map);
var marker;

map.on('click', function(e) {
    if (marker) {
        map.removeLayer(marker);
    }
    marker = L.marker(e.latlng).addTo(map);
    document.getElementById('latitude').value = e.latlng.lat;
    document.getElementById('longitude').value = e.latlng.lng;
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
  
  // Update cart count
  function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartCount = document.getElementById("cartCount");
    if (cartCount) {
      cartCount.textContent = cart.length;
    }
  }
  updateCartCount();
  
  // Toggle burger to cross
  const collapse = document.getElementById('navbarNav');
  const togglerIcon = document.querySelector('.navbar-toggler-icon-custom');
  if (collapse && togglerIcon) {
    collapse.addEventListener('show.bs.collapse', () => {
      togglerIcon.classList.remove('fa-bars');
      togglerIcon.classList.add('fa-times');
    });
    collapse.addEventListener('hide.bs.collapse', () => {
      togglerIcon.classList.add('fa-bars');
      togglerIcon.classList.remove('fa-times');
    });
  }
</script>

</body>
</html>
