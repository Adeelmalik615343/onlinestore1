<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - My Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">My Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <span class="navbar-text me-3" id="userName"></span>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">User Dashboard</h2>

    <!-- User Info -->
    <div class="card mb-4">
      <div class="card-header">Your Information</div>
      <div class="card-body">
        <div id="userInfo">
          <p><strong>Name:</strong> <span id="userNameDisplay"></span></p>
          <p><strong>Email:</strong> <span id="userEmail"></span></p>
          <p><strong>Member since:</strong> <span id="userCreatedAt"></span></p>
        </div>
      </div>
    </div>

    <!-- Orders -->
    <div class="card dashboard-orders-card">
      <div class="card-header">Your Orders</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped" id="ordersTable">
            <thead>
              <tr>
                <th>Tracking ID</th>
                <th>Status</th>
                <th>Products</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/user-dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
