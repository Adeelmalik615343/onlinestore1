<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body class="track-page bg-light">

<div class="container">
  <div class="mobile-shell">
    <h2 class="text-center mb-4">Track Your Order</h2>

    <!-- Input -->
    <div class="card track-card p-3 p-sm-4 shadow-sm border-0">
      <input 
        type="text" 
        id="trackingId" 
        class="form-control mb-3" 
        placeholder="Enter Tracking ID (e.g. ORD123456)">
      
      <button class="btn btn-primary w-100" onclick="trackOrder()">
        Track Order
      </button>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4"></div>

    <!-- Map -->
    <div id="map" style="height:400px; margin-top:30px; border-radius:8px; display:none; box-shadow:0 4px 6px rgba(0,0,0,0.1);"></div>
  </div>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/track.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
</script>

</body>
</html>
